name: hoyan-test

on:
  push:
    paths:
      - 'hoyan/**'
      - '.github/workflows/hoyan-test.yml'
  pull_request:
    paths:
      - 'hoyan/**'
      - '.github/workflows/hoyan-test.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hoyan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: hoyan/go.mod
      - run: go test ./...
      - run: go run ./cmd/hoyan verify --strict-config
      - name: Compare committed live snapshots
        run: |
          for lab in labs/*; do
            if [ ! -d "$lab" ]; then
              continue
            fi
            snapshot="$lab/snapshots/latest.json"
            if [ ! -f "$snapshot" ]; then
              echo "missing snapshot: $snapshot" >&2
              exit 1
            fi
            go run ./cmd/hoyan live-check --lab "$lab" --snapshot "$snapshot" --snapshot-hash-policy fail --offline
          done

  test-z3:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hoyan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: hoyan/go.mod
      - run: sudo apt-get update && sudo apt-get install -y libz3-dev
      - run: go test -tags z3 ./...
