frr version 10.6.1
frr defaults traditional
hostname sh-edge1
service integrated-vtysh-config
!
interface lo
 ip address 10.255.2.1/32
!
interface eth1
 ip address 198.18.1.2/31
!
interface eth2
 ip address 198.18.2.2/31
!
interface eth3
 ip address 198.18.10.4/31
!
ip route 10.2.0.0/16 Null0
!
ip prefix-list LOCAL seq 10 permit any
!
router bgp 65002
 timers bgp 1 3
 bgp router-id 10.255.2.1
 no bgp ebgp-requires-policy
 neighbor 198.18.10.5 remote-as 65100
 neighbor 198.18.1.3 remote-as 4200001002
 neighbor 198.18.2.3 remote-as 65002
 !
 address-family ipv4 unicast
  network 10.2.0.0/16
  neighbor 198.18.10.5 activate
  neighbor 198.18.10.5 next-hop-self
  neighbor 198.18.1.3 activate
  neighbor 198.18.1.3 next-hop-self
  neighbor 198.18.2.3 activate
  neighbor 198.18.2.3 next-hop-self
 exit-address-family
exit
!
line vty
