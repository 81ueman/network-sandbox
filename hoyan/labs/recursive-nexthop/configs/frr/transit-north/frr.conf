frr version 10.6.1
frr defaults traditional
hostname transit-north
service integrated-vtysh-config
!
interface lo
 ip address 10.255.200.1/32
!
interface eth1
 ip address 198.18.30.1/31
!
interface eth2
 ip address 198.18.30.3/31
!
interface eth3
 ip address 198.18.30.8/31
!
!
router bgp 65200
 timers bgp 1 3
 bgp router-id 10.255.200.1
 no bgp ebgp-requires-policy
 neighbor 198.18.30.0 remote-as 65100
 neighbor 198.18.30.2 remote-as 65100
 neighbor 198.18.30.9 remote-as 65200
 !
 address-family ipv4 unicast
  neighbor 198.18.30.0 activate
  neighbor 198.18.30.0 next-hop-self
  neighbor 198.18.30.2 activate
  neighbor 198.18.30.2 next-hop-self
  neighbor 198.18.30.9 activate
  neighbor 198.18.30.9 next-hop-self
 exit-address-family
exit
!
line vty
