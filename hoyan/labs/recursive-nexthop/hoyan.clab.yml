                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: edge
            kind: linux
            mgmt-ipv4: 172.86.89.42
        sh-edge1:
            binds:
                - configs/frr/sh-edge1/daemons:/etc/frr/daemons:ro
                - configs/frr/sh-edge1/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: edge
