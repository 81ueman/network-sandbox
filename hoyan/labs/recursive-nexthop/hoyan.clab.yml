                - configs/frr/gz-edge1/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: edge
            kind: linux
            mgmt-ipv4: 172.86.89.31
        gz-edge2:
            binds:
                - configs/frr/gz-edge2/daemons:/etc/frr/daemons:ro
                - configs/frr/gz-edge2/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: edge
