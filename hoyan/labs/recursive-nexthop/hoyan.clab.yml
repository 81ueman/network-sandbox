        sh-edge2:
            binds:
                - configs/frr/sh-edge2/daemons:/etc/frr/daemons:ro
                - configs/frr/sh-edge2/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: edge
            kind: linux
            mgmt-ipv4: 172.86.89.22
        transit-north:
            binds:
                - configs/frr/transit-north/daemons:/etc/frr/daemons:ro
