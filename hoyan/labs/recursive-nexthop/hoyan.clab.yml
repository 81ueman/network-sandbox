mgmt:
    ipv4-subnet: 172.86.89.0/24
    network: hoyan-recursive-nexthop
name: hoyan-recursive-nexthop
topology:
    kinds:
        arista_ceos:
            image: ceos:latest
        linux:
            image: hoyan-frr-nftables:10.6.1
        nokia_srlinux:
            image: ghcr.io/nokia/srlinux:25.10
            type: ixr-d2l
    links:
        - endpoints:
            - bj-edge1:eth1
            - cust-bj:eth1
        - endpoints:
            - sh-edge1:eth1
            - cust-sh:eth1
        - endpoints:
            - gz-edge1:eth1
            - cust-gz:eth1
        - endpoints:
            - hz-edge1:eth1
            - cust-hz:eth1
        - endpoints:
            - bj-edge1:eth2
            - bj-edge2:eth1
        - endpoints:
            - sh-edge1:eth2
            - sh-edge2:eth1
        - endpoints:
            - gz-edge1:eth2
            - gz-edge2:eth1
        - endpoints:
            - hz-edge1:eth2
            - hz-edge2:eth1
        - endpoints:
            - bj-edge1:eth3
            - core-bj:eth1
        - endpoints:
            - bj-edge2:eth2
            - core-bj:eth2
        - endpoints:
            - sh-edge1:eth3
            - core-sh:eth1
        - endpoints:
            - sh-edge2:eth2
            - core-sh:eth2
        - endpoints:
            - gz-edge1:eth3
            - core-gz:e1-1
        - endpoints:
            - gz-edge2:eth2
            - core-gz:e1-2
        - endpoints:
            - hz-edge1:eth3
            - core-hz:eth1
        - endpoints:
            - hz-edge2:eth2
            - core-hz:eth2
        - endpoints:
            - core-bj:eth3
            - core-sh:eth3
        - endpoints:
            - core-sh:eth4
            - core-gz:e1-3
        - endpoints:
            - core-gz:e1-4
            - core-hz:eth3
        - endpoints:
            - core-hz:eth4
            - core-bj:eth4
        - endpoints:
            - core-bj:eth5
            - core-gz:e1-5
        - endpoints:
            - core-sh:eth5
            - core-hz:eth5
        - endpoints:
            - core-bj:eth6
            - transit-north:eth1
        - endpoints:
            - core-sh:eth6
            - transit-north:eth2
        - endpoints:
            - core-gz:e1-6
            - transit-south:eth1
        - endpoints:
            - core-hz:eth6
            - transit-south:eth2
        - endpoints:
            - transit-north:eth3
            - transit-south:eth3
    nodes:
        bj-edge1:
            binds:
                - configs/frr/bj-edge1/daemons:/etc/frr/daemons:ro
                - configs/frr/bj-edge1/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: edge
            kind: linux
            mgmt-ipv4: 172.86.89.11
        bj-edge2:
            binds:
                - configs/frr/bj-edge2/daemons:/etc/frr/daemons:ro
                - configs/frr/bj-edge2/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: edge
            kind: linux
            mgmt-ipv4: 172.86.89.12
        core-bj:
            binds:
                - configs/frr/core-bj/daemons:/etc/frr/daemons:ro
                - configs/frr/core-bj/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: core
            kind: linux
            mgmt-ipv4: 172.86.89.101
        core-gz:
            group: core
            kind: nokia_srlinux
            mgmt-ipv4: 172.86.89.103
            startup-config: configs/srlinux/core-gz.cfg
        core-hz:
            binds:
                - configs/frr/core-hz/daemons:/etc/frr/daemons:ro
                - configs/frr/core-hz/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
                - configs/frr/core-hz/nftables.conf:/etc/hoyan/nftables.conf:ro
            group: core
            kind: linux
            mgmt-ipv4: 172.86.89.104
        core-sh:
            group: core
            kind: arista_ceos
            mgmt-ipv4: 172.86.89.102
            startup-config: configs/ceos/core-sh.cfg
        cust-bj:
            binds:
                - configs/frr/cust-bj/daemons:/etc/frr/daemons:ro
                - configs/frr/cust-bj/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: customer
            kind: linux
            mgmt-ipv4: 172.86.89.151
        cust-gz:
            binds:
                - configs/frr/cust-gz/daemons:/etc/frr/daemons:ro
                - configs/frr/cust-gz/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: customer
            kind: linux
            mgmt-ipv4: 172.86.89.153
        cust-hz:
            binds:
                - configs/frr/cust-hz/daemons:/etc/frr/daemons:ro
                - configs/frr/cust-hz/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: customer
            kind: linux
            mgmt-ipv4: 172.86.89.154
        cust-sh:
            binds:
                - configs/frr/cust-sh/daemons:/etc/frr/daemons:ro
                - configs/frr/cust-sh/frr.conf:/etc/frr/frr.conf:ro
                - configs/frr/common/vtysh.conf:/etc/frr/vtysh.conf:ro
            group: customer
            kind: linux
            mgmt-ipv4: 172.86.89.152
        gz-edge1:
