hostname core-sh
!
service routing protocols model multi-agent
!
ip routing
!
interface Loopback0
   ip address 10.255.100.2/32
!
interface Ethernet1
   no switchport
   ip address 198.18.10.5/31
!
interface Ethernet2
   no switchport
   ip address 198.18.10.7/31
!
interface Ethernet3
   no switchport
   ip address 198.18.20.1/31
!
interface Ethernet4
   no switchport
   ip address 198.18.20.2/31
!
interface Ethernet5
   no switchport
   ip address 198.18.20.10/31
!
interface Ethernet6
   no switchport
   ip address 198.18.30.2/31
!
router bgp 65100
   router-id 10.255.100.2
   neighbor 198.18.20.0 remote-as 65100
   neighbor 198.18.20.3 remote-as 65100
   neighbor 198.18.20.11 remote-as 65100
   neighbor 198.18.10.4 remote-as 65002
   neighbor 198.18.10.6 remote-as 65002
   neighbor 198.18.30.3 remote-as 65200
   address-family ipv4
      neighbor 198.18.20.0 activate
      neighbor 198.18.20.0 next-hop-self
      neighbor 198.18.20.3 activate
      neighbor 198.18.20.3 next-hop-self
      neighbor 198.18.20.11 activate
      neighbor 198.18.20.11 next-hop-self
      neighbor 198.18.10.4 activate
      neighbor 198.18.10.4 next-hop-self
      neighbor 198.18.10.6 activate
      neighbor 198.18.10.6 next-hop-self
      neighbor 198.18.30.3 activate
      neighbor 198.18.30.3 next-hop-self
