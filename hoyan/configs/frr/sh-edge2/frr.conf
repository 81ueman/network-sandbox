frr version 10.6.1
frr defaults traditional
hostname sh-edge2
service integrated-vtysh-config
!
interface lo
 ip address 10.255.2.2/32
!
interface eth1
 ip address 198.18.2.3/31
!
interface eth2
 ip address 198.18.10.6/31
!
!
router bgp 65002
 bgp router-id 10.255.2.2
 no bgp ebgp-requires-policy
 neighbor 198.18.10.7 remote-as 65100
 neighbor 198.18.2.2 remote-as 65002
 !
 address-family ipv4 unicast
  neighbor 198.18.10.7 activate
  neighbor 198.18.10.7 next-hop-self
  neighbor 198.18.2.2 activate
  neighbor 198.18.2.2 next-hop-self
 exit-address-family
exit
!
line vty
