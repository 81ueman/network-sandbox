frr version 10.6.1
frr defaults traditional
hostname gz-edge1
service integrated-vtysh-config
!
interface lo
 ip address 10.255.3.1/32
!
interface eth1
 ip address 198.18.1.4/31
!
interface eth2
 ip address 198.18.2.4/31
!
interface eth3
 ip address 198.18.10.8/31
!
ip route 10.3.0.0/16 Null0
!
ip prefix-list LOCAL seq 10 permit any
!
router bgp 65003
 bgp router-id 10.255.3.1
 no bgp ebgp-requires-policy
 neighbor 198.18.10.9 remote-as 65100
 neighbor 198.18.1.5 remote-as 4200001003
 neighbor 198.18.2.5 remote-as 65003
 !
 address-family ipv4 unicast
  network 10.3.0.0/16
  neighbor 198.18.10.9 activate
  neighbor 198.18.10.9 next-hop-self
  neighbor 198.18.1.5 activate
  neighbor 198.18.1.5 next-hop-self
  neighbor 198.18.2.5 activate
  neighbor 198.18.2.5 next-hop-self
 exit-address-family
exit
!
line vty
