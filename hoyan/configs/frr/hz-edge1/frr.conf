frr version 10.6.1
frr defaults traditional
hostname hz-edge1
service integrated-vtysh-config
!
interface lo
 ip address 10.255.4.1/32
!
interface eth1
 ip address 198.18.1.6/31
!
interface eth2
 ip address 198.18.2.6/31
!
interface eth3
 ip address 198.18.10.12/31
!
ip route 10.4.0.0/16 Null0
!
ip prefix-list LOCAL seq 10 permit any
!
router bgp 65004
 timers bgp 1 3
 bgp router-id 10.255.4.1
 no bgp ebgp-requires-policy
 neighbor 198.18.10.13 remote-as 65100
 neighbor 198.18.1.7 remote-as 4200001004
 neighbor 198.18.2.7 remote-as 65004
 !
 address-family ipv4 unicast
  network 10.4.0.0/16
  neighbor 198.18.10.13 activate
  neighbor 198.18.10.13 next-hop-self
  neighbor 198.18.1.7 activate
  neighbor 198.18.1.7 next-hop-self
  neighbor 198.18.2.7 activate
  neighbor 198.18.2.7 next-hop-self
 exit-address-family
exit
!
line vty
