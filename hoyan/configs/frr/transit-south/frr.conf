frr version 10.6.1
frr defaults traditional
hostname transit-south
service integrated-vtysh-config
!
interface lo
 ip address 10.255.200.2/32
!
interface eth1
 ip address 198.18.30.5/31
!
interface eth2
 ip address 198.18.30.7/31
!
interface eth3
 ip address 198.18.30.9/31
!
!
router bgp 65200
 timers bgp 1 3
 bgp router-id 10.255.200.2
 no bgp ebgp-requires-policy
 neighbor 198.18.30.4 remote-as 65100
 neighbor 198.18.30.6 remote-as 65100
 neighbor 198.18.30.8 remote-as 65200
 !
 address-family ipv4 unicast
  neighbor 198.18.30.4 activate
  neighbor 198.18.30.4 next-hop-self
  neighbor 198.18.30.6 activate
  neighbor 198.18.30.6 next-hop-self
  neighbor 198.18.30.8 activate
  neighbor 198.18.30.8 next-hop-self
 exit-address-family
exit
!
line vty
