frr version 10.6.1
frr defaults traditional
hostname core-bj
service integrated-vtysh-config
!
interface lo
 ip address 10.255.100.1/32
!
interface eth1
 ip address 198.18.10.1/31
!
interface eth2
 ip address 198.18.10.3/31
!
interface eth3
 ip address 198.18.20.0/31
!
interface eth4
 ip address 198.18.20.7/31
!
interface eth5
 ip address 198.18.20.8/31
!
interface eth6
 ip address 198.18.30.0/31
!
ip prefix-list BJ-LOCAL seq 10 permit 10.1.0.0/16 le 32
ip prefix-list BJ-EDGE1-NH seq 10 permit 198.18.10.0/32
bgp as-path access-list FROM-BJ permit ^65001$
bgp community-list standard BJ-DIRECT permit 65001:100
!
route-map PREFER-BJ-LOCAL permit 5
 match ip address prefix-list BJ-LOCAL
 match ip next-hop prefix-list BJ-EDGE1-NH
 match community BJ-DIRECT
 set local-preference +125
!
route-map PREFER-BJ-LOCAL permit 10
 match ip address prefix-list BJ-LOCAL
 match as-path FROM-BJ
 set local-preference 200
!
route-map PREFER-BJ-LOCAL permit 20
!
!
router bgp 65100
 timers bgp 1 3
 bgp router-id 10.255.100.1
 no bgp ebgp-requires-policy
 neighbor 198.18.10.0 remote-as 65001
 neighbor 198.18.10.2 remote-as 65001
 neighbor 198.18.20.9 remote-as 65100
 neighbor 198.18.20.6 remote-as 65100
 neighbor 198.18.20.1 remote-as 65100
 neighbor 198.18.30.1 remote-as 65200
 !
 address-family ipv4 unicast
  neighbor 198.18.10.0 activate
  neighbor 198.18.10.0 next-hop-self
  neighbor 198.18.10.0 route-map PREFER-BJ-LOCAL in
  neighbor 198.18.10.2 activate
  neighbor 198.18.10.2 next-hop-self
  neighbor 198.18.10.2 route-map PREFER-BJ-LOCAL in
  neighbor 198.18.20.9 activate
  neighbor 198.18.20.9 next-hop-self
  neighbor 198.18.20.6 activate
  neighbor 198.18.20.6 next-hop-self
  neighbor 198.18.20.1 activate
  neighbor 198.18.20.1 next-hop-self
  neighbor 198.18.30.1 activate
  neighbor 198.18.30.1 next-hop-self
 exit-address-family
exit
!
line vty
