frr version 10.6.1
frr defaults traditional
hostname cust-hz
service integrated-vtysh-config
!
interface lo
 ip address 10.4.1.10/32
!
interface eth1
 ip address 198.18.1.7/31
!
ip route 10.4.1.10/32 Null0
!
ip prefix-list LOCAL seq 10 permit any
!
router bgp 4200001004
 bgp router-id 10.4.1.10
 no bgp ebgp-requires-policy
 neighbor 198.18.1.6 remote-as 65004
 !
 address-family ipv4 unicast
  network 10.4.1.10/32
  neighbor 198.18.1.6 activate
  neighbor 198.18.1.6 next-hop-self
 exit-address-family
exit
!
line vty
