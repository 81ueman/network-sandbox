client1
# This file describes the network interfaces
auto eth1
iface eth1
    address 192.0.2.9/31

auto lo
iface lo
    address 127.0.0.1/8
    address 10.10.1.1/32

# ports.conf --

frr version 10.6.1
frr defaults traditional
hostname client1
service integrated-vtysh-config
!
interface lo
 ip address 10.10.1.1/32
!
interface eth1
 ip address 192.0.2.9/31
!
router bgp 65201
 bgp router-id 10.10.1.1
 neighbor 192.0.2.8 remote-as 65101
 !
 address-family ipv4 unicast
  network 10.10.1.1/32
  neighbor 192.0.2.8 activate
 exit-address-family
!
line vty
