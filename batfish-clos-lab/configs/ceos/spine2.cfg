!RANCID-CONTENT-TYPE: arista
hostname spine2
!
interface Loopback0
   ip address 10.255.0.2/32
!
interface Ethernet1
   no switchport
   ip address 192.0.2.2/31
   no shutdown
!
interface Ethernet2
   no switchport
   ip address 192.0.2.6/31
   no shutdown
!
ip routing
!
router bgp 65000
   router-id 10.255.0.2
   maximum-paths 4
   neighbor 192.0.2.3 remote-as 65101
   neighbor 192.0.2.7 remote-as 65102
   !
   address-family ipv4
      network 10.255.0.2/32
      neighbor 192.0.2.3 activate
      neighbor 192.0.2.7 activate
!
end

