!RANCID-CONTENT-TYPE: arista
hostname leaf1
!
interface Loopback0
   ip address 10.255.0.11/32
!
interface Ethernet1
   no switchport
   ip address 192.0.2.1/31
   no shutdown
!
interface Ethernet2
   no switchport
   ip address 192.0.2.3/31
   no shutdown
!
interface Ethernet3
   no switchport
   ip address 192.0.2.8/31
   no shutdown
!
ip routing
!
router bgp 65101
   router-id 10.255.0.11
   maximum-paths 4
   neighbor 192.0.2.0 remote-as 65000
   neighbor 192.0.2.2 remote-as 65000
   neighbor 192.0.2.9 remote-as 65201
   !
   address-family ipv4
      network 10.255.0.11/32
      neighbor 192.0.2.0 activate
      neighbor 192.0.2.2 activate
      neighbor 192.0.2.9 activate
!
end

