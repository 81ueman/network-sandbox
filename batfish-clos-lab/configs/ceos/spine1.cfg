!RANCID-CONTENT-TYPE: arista
hostname spine1
!
interface Loopback0
   ip address 10.255.0.1/32
!
interface Ethernet1
   no switchport
   ip address 192.0.2.0/31
   no shutdown
!
interface Ethernet2
   no switchport
   ip address 192.0.2.4/31
   no shutdown
!
ip routing
!
router bgp 65000
   router-id 10.255.0.1
   maximum-paths 4
   neighbor 192.0.2.1 remote-as 65101
   neighbor 192.0.2.5 remote-as 65102
   !
   address-family ipv4
      network 10.255.0.1/32
      neighbor 192.0.2.1 activate
      neighbor 192.0.2.5 activate
!
end

