!RANCID-CONTENT-TYPE: arista
hostname leaf2
!
interface Loopback0
   ip address 10.255.0.12/32
!
interface Ethernet1
   no switchport
   ip address 192.0.2.5/31
   no shutdown
!
interface Ethernet2
   no switchport
   ip address 192.0.2.7/31
   no shutdown
!
interface Ethernet3
   no switchport
   ip address 192.0.2.10/31
   no shutdown
!
ip routing
!
router bgp 65102
   router-id 10.255.0.12
   maximum-paths 4
   neighbor 192.0.2.4 remote-as 65000
   neighbor 192.0.2.6 remote-as 65000
   neighbor 192.0.2.11 remote-as 65202
   !
   address-family ipv4
      network 10.255.0.12/32
      neighbor 192.0.2.4 activate
      neighbor 192.0.2.6 activate
      neighbor 192.0.2.11 activate
!
end

