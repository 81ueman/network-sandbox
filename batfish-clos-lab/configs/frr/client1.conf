frr version 10.6.1
frr defaults traditional
hostname client1
service integrated-vtysh-config
!
interface lo
 ip address 10.10.1.1/32
!
interface eth1
 ip address 192.0.2.9/31
!
router bgp 65201
 bgp router-id 10.10.1.1
 no bgp ebgp-requires-policy
 neighbor 192.0.2.8 remote-as 65101
 !
 address-family ipv4 unicast
  network 10.10.1.1/32
  neighbor 192.0.2.8 activate
 exit-address-family
exit
!
line vty

