frr version 10.6.1
frr defaults traditional
hostname client2
service integrated-vtysh-config
!
interface lo
 ip address 10.10.2.1/32
!
interface eth1
 ip address 192.0.2.11/31
!
router bgp 65202
 bgp router-id 10.10.2.1
 no bgp ebgp-requires-policy
 neighbor 192.0.2.10 remote-as 65102
 !
 address-family ipv4 unicast
  network 10.10.2.1/32
  neighbor 192.0.2.10 activate
 exit-address-family
exit
!
line vty

