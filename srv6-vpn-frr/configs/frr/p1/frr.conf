frr version 10.6.1
frr defaults traditional
hostname p1
log stdout
service integrated-vtysh-config
!
interface eth1
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 network point-to-point
 ipv6 ospf6 cost 10
!
interface eth2
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 network point-to-point
 ipv6 ospf6 cost 10
!
interface eth3
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 network point-to-point
 ipv6 ospf6 cost 20
!
router ospf6
 ospf6 router-id 10.0.0.11
 redistribute connected
!
line vty
